services:
  mongo:
    image: mongo
    container_name: kipr-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/dbz
  auth:
    build:
      context: .
      dockerfile: ./apps/auth/Dockerfile
      target: development
    command: pnpm run start:dev auth
    container_name: kipr-auth
    ports:
      - '3001:3001'
    env_file:
      - ./apps/auth/.env
    depends_on:
      - mongo
    volumes:
      - .:/usr/src/app
  reservations:
    build:
      context: .
      dockerfile: ./apps/reservations/Dockerfile
      target: development
    command: pnpm run start:dev reservations
    container_name: kipr-reservations
    ports:
      - '3000:3000'
    env_file:
      - ./apps/reservations/.env
    depends_on:
      - mongo
    volumes:
      - .:/usr/src/app

volumes:
  mongo-data: